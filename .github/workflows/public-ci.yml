name: Public CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  portable-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Public repo validation
        run: bin/cc-public-ci-check
