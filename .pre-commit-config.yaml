repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        args: ["-S", "warning"]
        exclude: '^bin/fzf-git\.sh$'  # vendored zsh script from junegunn/fzf-git.sh; shellcheck does not support zsh dialect

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.10.0-2
    hooks:
      - id: shfmt
        args: ["-i", "2", "-ci", "-bn"]
        exclude: '^bin/fzf-git\.sh$'  # vendored zsh script — shfmt cannot parse zsh ${(%):-%x} syntax

  - repo: local
    hooks:
      - id: routing-drift
        name: routing-drift (CLAUDE.md ↔ skills/agents)
        entry: bash -c '"$HOME/.claude/scripts/routing-drift-check.sh"'
        language: system
        pass_filenames: false
        files: '^claude/(CLAUDE\.md|skills/.*|agents/.*)$'
