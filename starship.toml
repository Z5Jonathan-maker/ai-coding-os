# Starship prompt config — clean two-line layout with git branch + status

format = """
$directory$git_branch$git_status
$character"""

add_newline = false

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
style = "bold cyan"
truncation_length = 4
truncate_to_repo = true
read_only = " ⊘"

[git_branch]
format = " [$symbol$branch]($style)"
symbol = " "
style = "bold purple"

[git_status]
format = '[$all_status$ahead_behind]($style)'
style = "bold yellow"
ahead = "⇡${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "⇣${count}"
modified = " ✎"
staged = " ●"
untracked = " ?"
stashed = " ⚑"
conflicted = " ⚠"

[cmd_duration]
min_time = 2_000
format = " took [$duration]($style)"
