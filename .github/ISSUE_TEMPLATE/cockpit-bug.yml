name: Cockpit bug
description: Report VS Code cockpit UI, command, packaging, or display issues.
title: "[cockpit] "
labels: ["cockpit", "bug"]
body:
  - type: textarea
    id: readiness
    attributes:
      label: Product readiness output
      description: Paste `cc-product-readiness`.
      render: text
    validations:
      required: true
  - type: textarea
    id: cockpit
    attributes:
      label: Cockpit issue
      description: What did the VS Code cockpit show or fail to show?
    validations:
      required: true
  - type: textarea
    id: package
    attributes:
      label: Package proof
      description: Paste `cc-package-cockpit` output if packaging is involved.
      render: text
    validations:
      required: false
