name: Public CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  portable-checks:
    runs-on: ${{ fromJSON(vars.PUBLIC_CI_RUNNER || '["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Public repo validation
        run: bin/cc-public-ci-check
