# Tmux config — sensible defaults

# Use C-a like screen (easier to reach than C-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse mode on
set -g mouse on

# 256 color + true color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,xterm-ghostty:RGB"

# Start window/pane indices at 1 (easier reach)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Escape time — 0 is dangerous in some terminals; 10ms is safe
set -sg escape-time 10

# Larger scrollback
set -g history-limit 100000

# Native clipboard integration + focus events for editors
set -g set-clipboard on
set -g focus-events on

# Don't kill tmux server when last window closes
set -g detach-on-destroy off

# Vi-style copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Splits in current pane's directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# Status bar
set -g status-style "bg=default,fg=white"
set -g status-left "#[fg=green]#S "
set -g status-right "#[fg=cyan]%H:%M #[fg=yellow]%Y-%m-%d"
set -g status-right-length 50

# TPM plugins (install tpm first: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

run '~/.tmux/plugins/tpm/tpm'
